<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Testing highlight-smokedetector-matches</title>
    <style>
      pre {
        display: block;
        padding: 9.5px;
        margin: 0 0 10px;
        font-size: 13px;
        line-height: 1.42857143;
        color: #333;
        word-break: break-all;
        word-wrap: break-word;
        background-color: #f5f5f5;
        border: 1px solid #ccc;
        border-radius: 4px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .labeled-output {
        border: 1px solid #ddd;
        padding: 2px;
        border-radius: 4px;
        margin: 2px;
      }
      .highlighted {
        background-color: #f80;
      }
    </style>
    <script type="module" defer>
      import {
        fetchPost,
        Highlighter,
        parseReason,
        isBlacklistReason,
        getReasonPositions,
      } from "./dist/highlight-smokedetector-matches.js";
      async function loadPost() {
        const post = await fetchPost(document.getElementById("post-id").value);
        document.getElementById("post-body").textContent = post?.body;
        document.getElementById("post-title").textContent = post?.title;
        document.getElementById("post-username").textContent = post?.username;
        const reasons = [];
        if (post?.why) {
          const highlighters = new Map();
          highlighters.set("body", new Highlighter(post.body));
          highlighters.set("title", new Highlighter(post.title));
          highlighters.set("username", new Highlighter(post.username));
          for (const why of post.why) {
            const itemElement = document.createElement("li");
            const preElement = document.createElement("pre");
            itemElement.appendChild(preElement);
            preElement.textContent = why;
            reasons.push(itemElement);

            const whyMatch = parseReason(why);
            if (whyMatch && isBlacklistReason(whyMatch)) {
              preElement.classList += "highlighted";
              const highlighter = highlighters.get(whyMatch.postField);
              for (const range of getReasonPositions(whyMatch)) {
                highlighter.addHighlight(range);
              }
            }
          }
          for (const [field, highlighter] of highlighters) {
            document.getElementById("post-" + field).innerHTML =
              highlighter.getPreText("highlighted");
          }
        }
        document.getElementById("post-why").replaceChildren(...reasons);
      }
      document.getElementById("load-button").onclick = loadPost;
    </script>
  </head>
  <body>
    <h1>highlight-smokedetector-matches Tester</h1>
    <div class="labeled-output">
      <label>Title</label>
      <pre id="post-title"></pre>
    </div>
    <div class="labeled-output">
      <label>Body</label>
      <pre id="post-body"></pre>
    </div>
    <div class="labeled-output">
      <label>Username</label>
      <pre id="post-username"></pre>
    </div>
    <div class="labeled-output">
      <label>Why</label>
      <ul id="post-why"></ul>
    </div>
    <form action="javascript:void(0);">
      <label for="post-id">Post ID</label>
      <input type="text" id="post-id" />
      <button id="load-button">Load</button>
    </form>
  </body>
</html>
