<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Testing highlight-smokedetector-matches</title>
    <style>
      pre {
        display: block;
        padding: 9.5px;
        margin: 0 0 10px;
        font-size: 13px;
        line-height: 1.42857143;
        color: #333;
        word-break: break-all;
        word-wrap: break-word;
        background-color: #f5f5f5;
        border: 1px solid #ccc;
        border-radius: 4px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .labeled-output {
        border: 1px solid #ddd;
        padding: 2px;
        border-radius: 4px;
        margin: 2px;
      }
      .highlighted {
        background-color: #f80;
      }
    </style>
    <script src="dist/tester.js" type="module" defer></script>
  </head>
  <body>
    <h1>highlight-smokedetector-matches Tester</h1>
    <div class="labeled-output">
      <label>Title</label>
      <pre id="post-title"></pre>
    </div>
    <div class="labeled-output">
      <label>Body</label>
      <pre id="post-body"></pre>
    </div>
    <div class="labeled-output">
      <label>Username</label>
      <pre id="post-username"></pre>
    </div>
    <div class="labeled-output">
      <label>Why</label>
      <ul id="post-why"></ul>
    </div>
    <form action="javascript:void(0);">
      <label for="post-id">Post ID</label>
      <input type="text" id="post-id" />
      <button id="load-button">Load</button>
    </form>
  </body>
</html>
